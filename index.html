<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Pixel Squash</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <style>
      html, body { margin: 0; height: 100%; background: #10141f; overflow: hidden; }
      body { font-family: system-ui, "Noto Sans TC", sans-serif; color: #eee; user-select: none; -webkit-user-select: none; }
      #view { position: fixed; inset: 0; width: 100%; height: 100%; display: block; touch-action: none; }
      .hud { position: fixed; left: 0; right: 0; text-align: center; pointer-events: none; text-shadow: 0 1px 4px rgba(0,0,0,.8); }
      /* 轉播式角落計分:置左上,不遮前牆上方觀眾席 */
      #score {
        top: 10px; left: 12px; right: auto; text-align: left;
        font-size: 26px; font-weight: 700; width: fit-content;
        background: rgba(10, 14, 24, 0.55); border-radius: 10px; padding: 4px 14px;
      }
      #note { top: 56px; left: 12px; right: auto; text-align: left; font-size: 16px; color: #ffd166; min-height: 22px; }
      #serveHint { bottom: 118px; font-size: 16px; color: #9be8a8; }
      #hint { bottom: 8px; font-size: 12px; color: #8a93a8; }
      #quality { top: 96px; font-size: 26px; font-weight: 800; letter-spacing: 1px; opacity: 0; }
      #quality.q-perfect { color: #ffd700; animation: qpop .9s ease-out; }
      #quality.q-good { color: #9be8a8; animation: qpop .7s ease-out; }
      #quality.q-sloppy { color: #ff7b72; animation: qpop .7s ease-out; }
      @keyframes qpop {
        0% { opacity: 0; transform: scale(.6); }
        15% { opacity: 1; transform: scale(1.15); }
        30% { transform: scale(1); }
        70% { opacity: 1; }
        100% { opacity: 0; }
      }
      #shots { position: fixed; right: 14px; bottom: 64px; display: flex; flex-direction: column; gap: 10px; }
      #shots[hidden] { display: none; }
      #shots button {
        width: 76px; height: 48px; border-radius: 12px; border: 1px solid #3a4157;
        background: rgba(24,30,46,.85); color: #dfe6f3; font-size: 15px; font-family: inherit;
      }
      #shots button:active { background: #31548f; }
      #menu {
        position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center;
        gap: 14px;
        background:
          radial-gradient(circle at 50% 24%, rgba(255,210,118,.18), transparent 28%),
          linear-gradient(180deg, rgba(5,7,12,.78), rgba(12,15,23,.86) 48%, rgba(5,7,12,.92));
        backdrop-filter: blur(5px) saturate(1.08);
        z-index: 10;
        overflow-y: auto; padding: 16px 0;
      }
      /* margin:auto 夾心:內容放得下就垂直置中,放不下就整頁捲動(justify center 會裁頭) */
      #menu h1 {
        font-size: 44px; margin: auto 0 6px; letter-spacing: 2px;
        color: #f7efe0;
        text-shadow: 0 0 28px rgba(255,210,118,.26), 0 2px 10px rgba(0,0,0,.85);
      }
      #menu > a:last-child { margin-bottom: auto; }
      @media (max-height: 700px) {
        #menu { gap: 10px; }
        #menu h1 { font-size: 30px; }
      }
      #menu .sub { color: #c7cfde; margin-bottom: 12px; }
      #menu button {
        width: 240px; padding: 13px 0; font-size: 18px; font-family: inherit; border-radius: 12px;
        border: 1px solid rgba(255,255,255,.13);
        background: linear-gradient(180deg, rgba(39,47,68,.92), rgba(19,24,37,.92));
        color: #eef2fb; cursor: pointer;
        box-shadow: inset 0 1px 0 rgba(255,255,255,.08), 0 10px 26px rgba(0,0,0,.22);
      }
      #menu button:hover { background: linear-gradient(180deg, rgba(55,66,94,.96), rgba(27,34,52,.96)); }
      #menu .quick { display: flex; gap: 10px; }
      #menu button.daily {
        width: 280px;
        border-color: rgba(255,205,100,.72);
        background: linear-gradient(180deg, #ffd06a, #9b5e1d);
        color: #201204; font-weight: 800;
      }
      #menu button.daily:hover { background: linear-gradient(180deg, #ffe08a, #b86d22); }
      #menu .dailyMeta { font-size: 13px; color: #9aa3b8; margin-top: -6px; }
      #menu .quick button { width: 118px; padding: 9px 0; font-size: 14px; color: #aeb8cf; }
      #ladderTitle { font-size: 15px; color: #ffd166; margin-top: 4px; letter-spacing: 1px; }
      #ladder {
        display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px;
        width: min(416px, 94vw); max-height: 46vh; overflow-y: auto; padding: 2px;
      }
      #ladder button {
        width: 100%; padding: 8px 10px; font-size: 15px; text-align: left; line-height: 1.35;
        display: flex; flex-direction: column; gap: 2px;
        background: linear-gradient(180deg, rgba(30,37,54,.88), rgba(15,19,30,.88));
        border-color: rgba(170,190,220,.18);
      }
      #ladder button .tag { font-size: 11.5px; color: #8a93a8; font-weight: 400; }
      #ladder button:disabled {
        opacity: 0.45; cursor: not-allowed; background: #151a28;
      }
      #ladder button.beaten { border-color: #3f6b46; }
      #ladder button.beaten .rank::after { content: " ✓"; color: #9be8a8; }
      #ladder button.next { border-color: #ffd166; box-shadow: 0 0 22px rgba(255,209,102,.12), inset 0 1px 0 rgba(255,255,255,.10); }
      #menu .keys { font-size: 13px; color: #8a93a8; line-height: 1.9; text-align: center; }
      #menu a { color: #7fb4ff; font-size: 13px; }
      #endTitle { font-size: 30px; font-weight: 700; display: none; }
      #menu button.tutorial { border-color: #4f8f5c; color: #9be8a8; }
      #tutorial {
        position: fixed; top: 130px; left: 50%; transform: translateX(-50%);
        max-width: min(560px, 92vw); padding: 10px 18px; border-radius: 12px;
        background: rgba(15,26,20,.92); border: 1px solid #4f8f5c; color: #c9f2d0;
        font-size: 16px; text-align: center; z-index: 5; text-shadow: none;
      }
      #tutorial[hidden] { display: none; }
      #btnPause {
        position: fixed; top: 10px; right: 12px; z-index: 6;
        width: 44px; height: 40px; border-radius: 10px; border: 1px solid #3a4157;
        background: rgba(24,30,46,.75); color: #dfe6f3; font-size: 17px; font-family: inherit;
      }
      #btnPause[hidden] { display: none; }
      #pause {
        position: fixed; inset: 0; display: none; flex-direction: column; align-items: center;
        justify-content: center; gap: 16px; background: rgba(10,13,22,.9); z-index: 11;
      }
      #pause h2 { font-size: 30px; margin: 0; letter-spacing: 2px; }
      #pause button {
        width: 220px; padding: 12px 0; font-size: 17px; font-family: inherit; border-radius: 12px;
        border: 1px solid #3a4157; background: #1d2436; color: #eef2fb; cursor: pointer;
      }
      #pause button:hover { background: #2a3450; }
      #pause .vol { display: flex; align-items: center; gap: 10px; color: #9aa3b8; font-size: 14px; }
      #pause input[type='range'] { width: 180px; accent-color: #ffd166; }
    </style>
  </head>
  <body>
    <canvas id="view"></canvas>
    <div id="score" class="hud">0 : 0</div>
    <div id="note" class="hud"></div>
    <div id="quality" class="hud"></div>
    <div id="serveHint" class="hud"></div>
    <div id="hint" class="hud">移動 WASD/方向鍵 · 抽球 空白/J · 挑高 K · 放小 L · 殺球 ;</div>
    <div id="tutorial" hidden></div>
    <button id="btnPause" hidden aria-label="暫停">⏸</button>
    <div id="pause">
      <h2>暫停中</h2>
      <div class="vol">🔊 音量 <input id="volSlider" type="range" min="0" max="100" step="5" /> <span id="volVal"></span></div>
      <button id="btnResume">繼續(Esc)</button>
      <button id="btnQuit">回主選單</button>
    </div>
    <div id="shots" hidden>
      <button id="btnDrive">抽球</button>
      <button id="btnLob">挑高</button>
      <button id="btnDrop">放小</button>
      <button id="btnKill">殺球</button>
    </div>
    <div id="menu">
      <h1>PIXEL SQUASH</h1>
      <div class="sub">3D 壁球 · 你(藍)對 AI(橘) · PAR-11 先到 11 分(需贏 2 分)</div>
      <div id="endTitle" class="hud" style="position: static; display: none"></div>
      <button id="btnDaily" class="daily">每日挑戰</button>
      <div class="dailyMeta"><span id="dailyBest"></span> · <a id="dailyWatch" href="/replay.html">看今日 AI 表演賽</a></div>
      <div id="ladderTitle">生涯天梯 — 一路打上去</div>
      <div id="ladder"></div>
      <div class="quick">
        <button id="btnWeak">輕鬆</button>
        <button id="btnMedium">標準</button>
        <button id="btnStrong">挑戰</button>
      </div>
      <button id="btnTutorial" class="tutorial">新手教學(3 分鐘上手)</button>
      <div class="keys">
        移動:WASD / 方向鍵 / 左半螢幕搖桿<br />
        擊球:空白鍵或 J=抽球 · K=挑高 · L=放小 · ;=殺球<br />
        揮拍時按住 ←/→ 可瞄準左右角;輪到你發球時按任一擊球鍵發球
      </div>
      <a href="/replay.html?seed=20260707&a=strong&b=weak&rallies=6&autoplay=1">觀戰:AI 對打重播 →</a>
    </div>
    <script type="module" src="/src/game3d/main.ts"></script>
  </body>
</html>
